<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600&family=Italiana&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <!-- Your stylesheet -->
    <style>
        /* Spotify-like playlist layout tweaks (uses your theme) */
        .playlist-hero {
            display: flex;
            gap: 2.5rem;
            align-items: flex-end;
            padding: 3rem 0 2rem;
        }

        .playlist-cover {
            width: 260px;
            height: 260px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .playlist-meta small {
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .playlist-title {
            font-family: 'Italiana', serif;
            font-size: 4.5rem;
            background: transparent;
            border: none;
            color: white;
            width: 100%;
        }

        .playlist-desc {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 0.5rem;
            width: 100%;
        }

        .playlist-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .icon-btn:hover {
            border-color: var(--accent-purple);
            background: rgba(255,255,255,0.05);
            transform: scale(1.08);
        }

        .heart-btn.active {
            color: var(--accent-pink);
            border-color: var(--accent-pink);
        }

        .play-large {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px var(--glow);
        }

        .playlist-table {
            width: 100%;
            margin-top: 1.5rem;
        }

        .table-header,
        .track-row {
            display: grid;
            grid-template-columns: 40px 3fr 2fr 1.5fr 60px;
            align-items: center;
            padding: 0.9rem 0;
            gap: 1rem;
        }

        .table-header {
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .track-row {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s ease;
        }

        .track-row:hover {
            background: rgba(255,255,255,0.03);
        }

        .track-title input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.95rem;
            width: 100%;
            font-weight: 500;
        }

        .track-sub input {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            width: 100%;
        }

        .album input {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 100%;
        }

        .date input {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 100%;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--accent-pink);
            cursor: pointer;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .playlist-hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .playlist-title {
                font-size: 2.8rem;
            }

            .table-header,
            .track-row {
                grid-template-columns: 30px 1fr 80px;
            }

            .album, .date {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">MyMusic</div>
            <nav>
                <a href="#">Home</a>
                <a href="#">Browse</a>
                <a href="#">Library</a>
            </nav>
            <button class="btn-signin">Profile</button>
        </header>

        <!-- Spotify-Style Playlist Hero -->
        <section class="playlist-hero">
            <div class="playlist-cover">🎵</div>

            <div class="playlist-meta">
                <small>PLAYLIST</small>
                <br/>
                <input class="playlist-title" value="My Playlist" />
                <input class="playlist-desc" value="my favorite songs right now 💜" />
                <p style="margin-top:0.8rem; color: var(--text-secondary);">
                    You • 12 songs • 42 min
                </p>
            </div>
        </section>

        <!-- Controls Row -->
        <div class="playlist-controls">
            <button class="play-large">▶</button>
            <button class="icon-btn heart-btn" id="heartBtn" onclick="toggleFavorite()">♡</button>
            <button class="icon-btn" title="More options">⋯</button>
        </div>

        <!-- Track Table (Spotify Layout) -->
        <section class="playlist-table" id="trackTable">
            <div class="table-header">
                <div>#</div>
                <div>TITLE</div>
                <div class="album">ALBUM</div>
                <div class="date">DATE ADDED</div>
                <div style="font-size: 1.2rem;">⏱</div>
            </div>

            <!-- Track Row -->
            <div class="track-row">
                <div>1</div>
                <div>
                    <div class="track-title">
                        <input value="Song Title" />
                    </div>
                    <div class="track-sub">
                        <input value="Artist Name" />
                    </div>
                </div>
                <div class="album">
                    <input value="Album Name" />
                </div>
                <div class="date">
                    <input value="Today" />
                </div>
                <div>
                    <button class="remove-btn" onclick="removeTrack(this)">✕</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        function toggleFavorite() {
            const btn = document.getElementById('heartBtn');
            btn.classList.toggle('active');
            btn.textContent = btn.classList.contains('active') ? '♥' : '♡';
        }
        function addTrack() {
            const table = document.getElementById('trackTable');
            const count = table.querySelectorAll('.track-row').length + 1;

            const row = document.createElement('div');
            row.className = 'track-row';
            row.innerHTML = `
                <div>${count}</div>
                <div>
                    <div class="track-title">
                        <input value="New Song" />
                    </div>
                    <div class="track-sub">
                        <input value="Unknown Artist" />
                    </div>
                </div>
                <div class="album">
                    <input value="Single" />
                </div>
                <div class="date">
                    <input value="Today" />
                </div>
                <div>
                    <button class="remove-btn" onclick="removeTrack(this)">✕</button>
                </div>
            `;

            table.appendChild(row);
            reindex();
        }

        function removeTrack(btn) {
            btn.closest('.track-row').remove();
            reindex();
        }

        function reindex() {
            const rows = document.querySelectorAll('.track-row');
            rows.forEach((row, i) => {
                row.children[0].textContent = i + 1;
            });
        }
    </script>
</body>
</html>
